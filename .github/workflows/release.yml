name: Release

on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  OPENCLAW_REPO: 'https://github.com/openclaw/openclaw'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: 端到端完整测试（ubuntu-24.04 & macos-latest）
  #         测试通过后才执行版本递增和发布
  # ──────────────────────────────────────────────────────────────────────────
  test:
    if: github.event.pull_request.merged == true
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Clone openclaw upstream
        run: git clone ${{ env.OPENCLAW_REPO }} openclaw

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: openclaw/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install openclaw dependencies
        working-directory: openclaw
        run: pnpm install

      - name: Build openclaw
        working-directory: openclaw
        run: pnpm build

      - name: Setup config from template
        run: |
          mkdir -p ~/.openclaw
          cp config-templates/openclaw.json ~/.openclaw/openclaw.json

      # systemd user session 支持（Linux 需要 XDG_RUNTIME_DIR）
      - name: Enable systemd user session
        if: runner.os == 'Linux'
        run: |
          sudo loginctl enable-linger $USER || true
          XDG_DIR="/run/user/$(id -u)"
          sudo mkdir -p "$XDG_DIR"
          sudo chown $USER "$XDG_DIR"
          echo "XDG_RUNTIME_DIR=$XDG_DIR" >> $GITHUB_ENV

      # Run setup-crew.sh + apply-addons.sh separately.
      # We intentionally skip the `pnpm openclaw daemon install` step that
      # reinstall-daemon.sh would also execute: daemon installation requires
      # a real user session (systemd on Linux, launchd on macOS) and cannot
      # be meaningfully tested in a headless CI runner.
      - name: Run setup-crew.sh
        run: bash scripts/setup-crew.sh

      - name: Run apply-addons.sh
        run: bash scripts/apply-addons.sh

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: 测试通过后，按 PR 标签自动递增版本号并提交
  # ──────────────────────────────────────────────────────────────────────────
  bump-version:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: bump
        run: |
          set -e
          current=$(cat version | tr -d 'v' | tr -d '[:space:]')
          IFS='.' read -r major minor patch <<< "$current"

          # 通过 PR 标签决定递增类型（默认 patch）
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"major"'; then
            major=$((major + 1)); minor=0; patch=0
          elif echo "$LABELS" | grep -q '"minor"'; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          NEW_VERSION="v${major}.${minor}.${patch}"
          echo "$NEW_VERSION" > version
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to: $NEW_VERSION"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: 构建打包并发布 Release
  # ──────────────────────────────────────────────────────────────────────────
  release:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Clone openclaw upstream
        run: git clone ${{ env.OPENCLAW_REPO }} openclaw

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: openclaw/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install openclaw dependencies
        working-directory: openclaw
        run: pnpm install

      - name: Build openclaw
        working-directory: openclaw
        run: pnpm build

      - name: Create release archive
        id: archive
        timeout-minutes: 10
        run: |
          VERSION="${{ needs.bump-version.outputs.version }}"
          ARCHIVE="openclaw-for-business-${VERSION}.zip"

          # 准备打包目录
          STAGE=$(mktemp -d)
          DEST="${STAGE}/openclaw_for_business"
          mkdir -p "$DEST"

          # 拷贝项目文件（排除 .git、addons 子目录内容和 openclaw 克隆目录）
          rsync -a \
            --exclude='.git/' \
            --exclude='addons/*' \
            --exclude='openclaw/' \
            . "$DEST/"

          # 拷贝 openclaw 上游代码（排除 .git 历史，保留 node_modules 和构建产物供用户直接使用）
          rsync -a --exclude='.git/' \
            openclaw/ "$DEST/openclaw/"

          # 打包（-q 静默模式，减少日志输出）
          cd "$STAGE"
          zip -qr "${GITHUB_WORKSPACE}/${ARCHIVE}" openclaw_for_business/

          echo "archive=${ARCHIVE}" >> $GITHUB_OUTPUT
          echo "Archive created: ${ARCHIVE}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.version }}
          name: "Release ${{ needs.bump-version.outputs.version }}"
          generate_release_notes: true
          files: "*.zip"
